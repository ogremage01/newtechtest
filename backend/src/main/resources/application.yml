spring:
  application:
    name: shop-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/shop}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MariaDBDialect

server:
  port: ${SERVER_PORT:2602}

app:
  cors:
    origins: ${CORS_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-change-in-production-must-be-long-enough}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  # 개인정보(주소, 전화번호) AES-256 암호화용 키. Base64 인코딩된 32바이트 권장.
  personal-data-encryption-key: ${PERSONAL_DATA_ENCRYPTION_KEY:}
